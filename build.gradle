plugins {
    id 'java'
    id 'net.neoforged.moddev' version '2.0.28-beta'
}

version = "${mod_version}"
group = "${mod_group_id}"

base {
    archivesName = "${mod_id}"
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

neoForge {
    version = "${neo_version}"

    runs {
        client {
            client()
        }
        server {
            server()
            programArgument '--nogui'
        }
    }

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

repositories {
    maven {
        name = "Mojang"
        url = "https://libraries.minecraft.net"
    }
}

dependencies {}
